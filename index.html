<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livo Hub - Sistema de Captación</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Livo Hub">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Urbanist:wght@600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pb: #49d5ba;
            --secondary-pb: #bbf4ed;
            --bg-body: #f2f0f0;
            --surface: #d9d9d9;
            --text: #000000;
        }

        body { font-family: 'Inter', sans-serif; background-color: #f2f0f0; }
        .font-black { font-weight: 900; }
        .italic { font-style: italic; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f2f0f0; }
        ::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #49d5ba; }

        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-home-pill {
            background-color: #000000; color: #ffffff; border-radius: 9999px;
            padding: 1.25rem 2rem; font-weight: 900; font-style: italic;
            text-transform: uppercase; font-size: 1.5rem; letter-spacing: -0.025em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2); width: 100%; max-width: 320px; text-align: center;
        }
        .btn-home-pill:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.3); filter: brightness(1.2); }
        .btn-home-pill:active { transform: scale(0.96); }

        .urbanist { font-family: 'Urbanist', sans-serif; }
        .main-card-pb { background-color: var(--surface); border-radius: 1.5rem; border: 1px solid rgba(0, 0, 0, 0.03); }
        .data-table-container-pb { background-color: #ffffff; border-radius: 1rem; overflow: hidden; }
        .niche-tag-pb { font-size: 10px; padding: 2px 8px; border-radius: 9999px; text-transform: uppercase; font-weight: 700; background-color: var(--secondary-pb); color: #1f5a4e; border: 1px solid rgba(73, 213, 186, 0.2); }
        .notepad-area-pb { background-color: #ffffff; background-image: linear-gradient(var(--bg-body) 1px, transparent 1px); background-size: 100% 2.5rem; line-height: 2.5rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBgVAAYURCEGdqNya8sizkV7ruL18zu10g",
            authDomain: "livohub-e1cap.firebaseapp.com",
            projectId: "livohub-e1cap",
            storageBucket: "livohub-e1cap.firebasestorage.app",
            messagingSenderId: "66423421771",
            appId: "1:66423421771:web:d69e8178fa2dd0bd6bc6ce"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        const Icon = ({ name, size = 24, className = "", strokeWidth = 2, color = "currentColor" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, strokeWidth: strokeWidth, color: color }}></i>;
        };

        const LivoLogo = ({ className = "h-48" }) => (
            <svg viewBox="0 0 300 200" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="20" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>L</text>
                <text x="85" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>ı</text>
                <circle cx="98" cy="45" r="14" fill="#00ead0" />
                <text x="120" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>vo</text>
                <text x="200" y="170" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="55" fill="#00ead0">mx</text>
            </svg>
        );

        const App = () => {
            const colors = { neon: '#00ead0', primaryPB: '#49d5ba', bg: '#f2f0f0', card: '#d9d9d9' };
            const [currentView, setCurrentView] = useState('home');
            const [canales, setCanales] = useState([]);
            const [ideasGenerales, setIdeasGenerales] = useState([]);
            const [registrosPuntoB, setRegistrosPuntoB] = useState([]);
            const [activeIdeaTab, setActiveIdeaTab] = useState('captacion');
            const [filtroCanalDestino, setFiltroCanalDestino] = useState('Todos');
            const [showModalIdea, setShowModalIdea] = useState(false);
            const [showModalCanal, setShowModalCanal] = useState(false);
            const [showModalPBRapido, setShowModalPBRapido] = useState(false);
            const [showModalPBDesarrollo, setShowModalPBDesarrollo] = useState(false);
            const [showModalPBNotas, setShowModalPBNotas] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [notaActiva, setNotaActiva] = useState({ id: null, titulo: '', contenido: '' });

            useEffect(() => {
                const unsubCanales = db.collection("canales").onSnapshot(snap => setCanales(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubIdeas = db.collection("ideas").orderBy("fechaCreacion", "desc").onSnapshot(snap => setIdeasGenerales(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubRadar = db.collection("radar").orderBy("fechaCreacion", "desc").onSnapshot(snap => setRegistrosPuntoB(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                return () => { unsubCanales(); unsubIdeas(); unsubRadar(); };
            }, []);

            const agregarCanal = async (e) => {
                e.preventDefault(); const nombre = e.target.nuevoCanal.value.trim().toUpperCase();
                if (!nombre) return; await db.collection("canales").add({ nombre }); e.target.reset(); setShowModalCanal(false);
            };

            const eliminarCanal = async (id, nombre) => { if (confirm(`¿Eliminar canal "${nombre}"?`)) await db.collection("canales").doc(id).delete(); };

            const captarIdea = async (e) => {
                e.preventDefault(); const formData = new FormData(e.target);
                await db.collection("ideas").add({
                    titulo: formData.get('titulo'), urlReferencia: formData.get('urlRef'), urlObjetivo: formData.get('urlObj'),
                    canalDestino: formData.get('canalDestino'), prioridad: 'Media', estatus: 'Pendiente', formato: 'PD',
                    fechaEstimada: '', fechaCreacion: firebase.firestore.FieldValue.serverTimestamp()
                });
                setShowModalIdea(false);
            };

            const updateIdea = async (id, key, value) => await db.collection("ideas").doc(id).update({ [key]: value });
            const eliminarIdea = async (id) => { if (confirm('¿Eliminar esta idea definitivamente?')) await db.collection("ideas").doc(id).delete(); };

            const registrarPBRapido = async (e) => {
                e.preventDefault(); const formData = new FormData(e.target);
                await db.collection("radar").add({
                    clave: formData.get('clave') || '', nicho: formData.get('nicho'), subnicho: formData.get('subnicho'),
                    micronicho: formData.get('micronicho') || '', nanonicho: formData.get('nanonicho') || '',
                    idea: formData.get('ideaCanal'), urlObjetivo: formData.get('urlObjetivo'), redSocial: formData.get('redSocial'),
                    formato: 'videos largos', region: 'España/Latam', publico: '',
                    escalabilidad: 3, competencia: 3, monetizacion: 'media', prioridad: 'media', estado: 'Idea',
                    observaciones: '', fechaCreacion: firebase.firestore.FieldValue.serverTimestamp()
                });
                setShowModalPBRapido(false);
            };

            const guardarEdicionPB = async (e) => {
                e.preventDefault(); const formData = new FormData(e.target);
                await db.collection("radar").doc(editItem.id).update({
                    clave: formData.get('editClave'), nicho: formData.get('editNicho'), subnicho: formData.get('editSubnicho'),
                    micronicho: formData.get('editMicronicho'), nanonicho: formData.get('editNanonicho'), idea: formData.get('editIdea'),
                    urlObjetivo: formData.get('editUrl'), redSocial: formData.get('editRed'), formato: formData.get('editFormato'),
                    region: formData.get('editRegion'), publico: formData.get('editPublico'),
                    escalabilidad: parseInt(formData.get('editEscalabilidad')), competencia: parseInt(formData.get('editCompetencia')),
                    monetizacion: formData.get('editMonetizacion'), prioridad: formData.get('editPrioridad'), estado: formData.get('editEstado')
                });
                setShowModalPBDesarrollo(false);
            };

            const eliminarRegistroRadar = async (id, idea) => { if (confirm(`¿Eliminar definitivamente "${idea}"?`)) await db.collection("radar").doc(id).delete(); };

            if (currentView === 'home') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 animate-fade-in">
                        <div className="w-full flex flex-col items-center">
                            <LivoLogo className="h-40 md:h-56 w-auto mb-4" />
                            <h2 className="text-lg md:text-xl font-black uppercase italic tracking-[0.3em] text-gray-800 mb-10 text-center">ETAPA 1: CAPTACIÓN</h2>
                            <div className="flex flex-col items-center gap-6 w-full">
                                <button onClick={() => setCurrentView('idea-hub')} className="btn-home-pill">Idea Hub</button>
                                <button onClick={() => setCurrentView('canal-radar')} className="btn-home-pill">Punto B Radar</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (currentView === 'idea-hub') {
                return (
                    <div className="min-h-screen pb-20 animate-fade-in">
                        <nav className="bg-white border-b border-gray-200 px-4 md:px-8 py-3 sticky top-0 z-40">
                            <div className="max-w-[1600px] mx-auto flex justify-between items-center">
                                <div className="flex items-center gap-4 md:gap-12">
                                    <button onClick={() => setCurrentView('home')} className="p-2 hover:bg-gray-100 rounded-full text-black"><Icon name="chevron-left" strokeWidth={3} /></button>
                                    <h1 className="text-2xl md:text-3xl font-black tracking-tighter italic hidden sm:block uppercase">LIVO<span className="text-[#49d5ba] not-italic">HUB</span></h1>
                                    <div className="flex bg-gray-100 p-1 rounded-xl shadow-inner overflow-x-auto">
                                        <button onClick={() => setActiveIdeaTab('captacion')} className={`px-3 md:px-6 py-2 rounded-lg text-[10px] md:text-xs font-black uppercase transition-all ${activeIdeaTab === 'captacion' ? 'bg-white shadow-md text-black' : 'text-gray-400'}`}>1. Registro</button>
                                        <button onClick={() => setActiveIdeaTab('gestion')} className={`px-3 md:px-6 py-2 rounded-lg text-[10px] md:text-xs font-black uppercase transition-all ${activeIdeaTab === 'gestion' ? 'bg-white shadow-md text-black' : 'text-gray-400'}`}>2. Plan</button>
                                        <button onClick={() => setActiveIdeaTab('config')} className={`px-3 py-2 rounded-lg transition-all ${activeIdeaTab === 'config' ? 'bg-white shadow-md text-black' : 'text-gray-400'}`}><Icon name="settings" size={16} /></button>
                                    </div>
                                </div>
                                <button onClick={() => setShowModalIdea(true)} className="bg-[#49d5ba] text-black font-black px-4 md:px-8 py-3 rounded-2xl flex items-center gap-2 shadow-lg active:scale-95 transition-all"><Icon name="plus" size={18} strokeWidth={3} /><span className="hidden md:inline uppercase text-xs">Captar Idea</span></button>
                            </div>
                        </nav>
                        <main className="max-w-[1600px] mx-auto p-4 md:p-8">
                            {activeIdeaTab === 'captacion' && (
                                <section className="space-y-6">
                                    <div className="bg-[#d9d9d9] rounded-[2rem] p-6 shadow-sm">
                                        <div className="flex flex-wrap gap-2 mb-8 bg-white/40 p-2 rounded-[1.5rem] border border-white/60">
                                            <button onClick={() => setFiltroCanalDestino('Todos')} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all border ${filtroCanalDestino === 'Todos' ? 'bg-black text-[#49d5ba]' : 'bg-white text-gray-400'}`}>Todos</button>
                                            {canales.map(c => <button key={c.id} onClick={() => setFiltroCanalDestino(c.nombre)} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase border ${filtroCanalDestino === c.nombre ? 'bg-black text-[#49d5ba]' : 'bg-white text-gray-400'}`}>{c.nombre}</button>)}
                                        </div>
                                        <div className="bg-white rounded-3xl overflow-hidden shadow-inner overflow-x-auto">
                                            <table className="w-full text-left text-sm min-w-[800px]">
                                                <thead>
                                                    <tr className="bg-gray-50 border-b text-[10px] font-black uppercase text-gray-400">
                                                        <th className="px-8 py-5 text-black">Concepto</th><th className="px-6 py-5 text-center">Referencia</th><th className="px-6 py-5 text-center">Meta</th><th className="px-6 py-5 text-center">Canal</th><th className="px-8 py-5 text-right">Borrar</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-50">
                                                    {ideasGenerales.filter(i => filtroCanalDestino === 'Todos' || i.canalDestino === filtroCanalDestino).map(idea => (
                                                        <tr key={idea.id} className="hover:bg-gray-50 group">
                                                            <td className="px-8 py-5 font-bold uppercase italic text-gray-900">{idea.titulo}</td>
                                                            <td className="px-6 py-5 text-center">{idea.urlReferencia && <a href={idea.urlReferencia} target="_blank"><Icon name="external-link" size={16} className="text-gray-300 hover:text-black mx-auto" /></a>}</td>
                                                            <td className="px-6 py-5 text-center">{idea.urlObjetivo && <a href={idea.urlObjetivo} target="_blank"><Icon name="layout" size={16} className="text-gray-300 hover:text-[#49d5ba] mx-auto" /></a>}</td>
                                                            <td className="px-6 py-5 text-center"><span className="bg-black text-[#49d5ba] px-4 py-1 rounded-full text-[9px] font-black uppercase">{idea.canalDestino}</span></td>
                                                            <td className="px-8 py-5 text-right"><button onClick={() => eliminarIdea(idea.id)} className="text-gray-200 hover:text-red-500"><Icon name="trash-2" size={16} /></button></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </section>
                            )}
                        </main>
                    </div>
                );
            }

            if (currentView === 'canal-radar') {
                return (
                    <div className="min-h-screen pb-20 animate-fade-in">
                        <header className="px-8 py-10 flex flex-col md:flex-row justify-between items-end md:items-center gap-4 max-w-[1600px] mx-auto">
                            <div className="flex items-center gap-6"><button onClick={() => setCurrentView('home')} className="p-4 bg-white rounded-2xl shadow-sm transition-all text-black hover:bg-gray-100"><Icon name="chevron-left" strokeWidth={3} /></button><div><h1 className="text-5xl font-black tracking-tighter urbanist uppercase">PUNTO <span style={{color: colors.primaryPB}}>B</span></h1><p className="text-gray-500 font-semibold text-lg">Central de Inteligencia de Canales</p></div></div>
                            <button onClick={() => setShowModalPBRapido(true)} className="px-10 py-5 rounded-2xl flex items-center gap-3 text-lg font-bold shadow-sm active:scale-95 transition-all" style={{backgroundColor: colors.primaryPB}}><Icon name="zap" size={24} /> + CAPTURA RÁPIDA</button>
                        </header>

                        <main className="max-w-[1600px] mx-auto p-4 md:p-8 space-y-12">
                            {/* TABLA 1: GENERAL */}
                            <section>
                                <div className="main-card-pb p-8 shadow-sm">
                                    <div className="flex items-center gap-3 mb-8"><div className="w-1.5 h-8 rounded-full" style={{backgroundColor: colors.primaryPB}}></div><h2 className="text-xl font-bold uppercase tracking-widest text-gray-700 italic font-black">1. Tabla General</h2></div>
                                    <div className="data-table-container-pb shadow-sm border border-black/5 overflow-x-auto">
                                        <table className="w-full text-sm text-left min-w-[1400px]">
                                            <thead>
                                                <tr className="text-gray-400 uppercase text-[10px] font-black tracking-widest bg-[#f8f8f8]">
                                                    <th className="px-6 py-6">Identificador/Código/Clave</th><th className="px-6 py-6">Nicho</th><th className="px-6 py-6">Subnicho</th><th className="px-6 py-6">Micronicho</th><th className="px-6 py-6">Nanonicho</th><th className="px-6 py-6">Idea del canal</th><th className="px-6 py-6">URL contenido/canal</th><th className="px-6 py-6">Red social principal</th><th className="px-6 py-6">Formato</th><th className="px-6 py-6 text-right">Borrar</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-50">
                                                {registrosPuntoB.map(r => (
                                                    <tr key={r.id} className="hover:bg-teal-50/40 transition-colors">
                                                        <td className="px-6 py-6 font-black text-xs text-gray-900">{r.clave || '---'}</td><td className="px-6 py-6"><span className="niche-tag-pb">{r.nicho}</span></td><td className="px-6 py-6 font-bold text-gray-400 text-[10px] uppercase">{r.subnicho}</td><td className="px-6 py-6 font-bold text-gray-400 text-[10px] uppercase">{r.micronicho || '-'}</td><td className="px-6 py-6 font-bold text-gray-400 text-[10px] uppercase">{r.nanonicho || '-'}</td><td className="px-6 py-6 font-black text-gray-900 italic uppercase">{r.idea}</td><td className="px-6 py-6 text-center">{r.urlObjetivo && <a href={r.urlObjetivo} target="_blank" className="text-gray-300 hover:text-black transition-all"><Icon name="link-2" size={20} /></a>}</td><td className="px-6 py-6"><span className="px-3 py-1.5 rounded-lg bg-gray-100 border border-gray-200 text-[10px] font-black uppercase text-gray-600">{r.redSocial}</span></td><td className="px-6 py-6 font-bold text-[10px] uppercase text-gray-400">{r.formato}</td><td className="px-6 py-6 text-right"><button onClick={() => eliminarRegistroRadar(r.id, r.idea)} className="text-gray-200 hover:text-red-500 transition-colors"><Icon name="trash-2" size={18} /></button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </section>

                            {/* TABLA 2: PARTICULAR */}
                            <section>
                                <div className="main-card-pb p-8 shadow-sm">
                                    <div className="flex items-center gap-3 mb-8"><div className="w-1.5 h-8 rounded-full bg-black"></div><h2 className="text-xl font-bold uppercase tracking-widest text-gray-700 italic font-black">2. Tabla Particular (Análisis)</h2></div>
                                    <div className="data-table-container-pb shadow-sm border border-black/5 overflow-x-auto">
                                        <table className="w-full text-[11px] text-left min-w-[2000px]">
                                            <thead>
                                                <tr className="text-gray-400 uppercase font-black text-[10px] tracking-widest bg-[#f8f8f8]">
                                                    <th className="px-6 py-6">Identificador/Código/Clave</th><th className="px-4 py-6">Nicho</th><th className="px-4 py-6">Subnicho</th><th className="px-4 py-6">Micronicho</th><th className="px-4 py-6">Nanonicho</th><th className="px-6 py-6">Idea del canal</th><th className="px-4 py-6">URL contenido/canal</th><th className="px-4 py-6">Red social principal</th><th className="px-4 py-6">Formato</th><th className="px-4 py-6">Región</th><th className="px-4 py-6">Público</th><th className="px-4 py-6 text-center">Escalabilidad</th><th className="px-4 py-6 text-center">Competencia</th><th className="px-4 py-6">Monetización</th><th className="px-4 py-6">Prioridad</th><th className="px-4 py-6">Estado</th><th className="px-4 py-6 text-center">Notas</th><th className="px-6 py-6 text-right">Acción</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-50">
                                                {registrosPuntoB.map(r => (
                                                    <tr key={r.id} className="hover:bg-teal-50/30">
                                                        <td className="px-6 py-6 font-black text-gray-900">{r.clave || '---'}</td><td className="px-4 py-6"><span className="niche-tag-pb">{r.nicho}</span></td><td className="px-4 py-6 font-bold text-gray-400 uppercase">{r.subnicho}</td><td className="px-4 py-6 font-bold text-gray-400 uppercase">{r.micronicho || '-'}</td><td className="px-4 py-6 font-bold text-gray-400 uppercase">{r.nanonicho || '-'}</td><td className="px-6 py-6 font-black text-gray-900 uppercase italic tracking-tighter">{r.idea}</td><td className="px-4 py-6 text-center">{r.urlObjetivo && <a href={r.urlObjetivo} target="_blank" className="text-gray-300 hover:text-black"><Icon name="link" size={16} /></a>}</td><td className="px-4 py-6"><span className="px-2 py-1 rounded bg-gray-50 text-[9px] font-black uppercase text-gray-500">{r.redSocial}</span></td><td className="px-4 py-6 uppercase font-bold text-gray-400">{r.formato}</td><td className="px-4 py-6 uppercase font-bold text-gray-400">{r.region}</td><td className="px-4 py-6 uppercase font-bold text-gray-400 tracking-tight">{r.publico || '-'}</td><td className="px-4 py-6 text-center text-yellow-500 text-sm">{'★'.repeat(r.escalabilidad)}</td><td className="px-4 py-6 text-center text-red-400 text-sm">{'★'.repeat(r.competencia || 3)}</td><td className="px-4 py-6 font-black uppercase italic" style={{color: colors.primaryPB}}>{r.monetizacion || 'media'}</td><td className="px-4 py-6 font-black uppercase text-gray-400">{r.prioridad || 'media'}</td><td className="px-4 py-6"><span className="flex items-center gap-1.5 font-black text-[9px] uppercase tracking-wide"><i className="fa-solid fa-circle text-[5px]" style={{color: colors.primaryPB}}></i> {r.estado}</span></td><td className="px-4 py-6 text-center"><button onClick={() => { setNotaActiva({id: r.id, titulo: r.idea, contenido: r.observaciones}); setShowModalPBNotas(true); }} className={`w-10 h-10 rounded-2xl flex items-center justify-center transition-all ${r.observaciones ? 'bg-black text-white shadow-md' : 'bg-gray-50 text-gray-200 border border-gray-100'}`}><Icon name="pen-tool" size={16} /></button></td><td className="px-6 py-6 text-right"><button onClick={() => { setEditItem(r); setShowModalPBDesarrollo(true); }} className="text-[10px] font-black px-5 py-2 rounded-xl border-2 border-black hover:bg-black hover:text-white transition-all uppercase italic tracking-widest shadow-sm active:scale-95">Ajustes</button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </section>
                        </main>

                        {/* MODALES RADAR */}
                        {showModalPBDesarrollo && editItem && (
                            <div className="fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-5xl rounded-[3rem] p-10 md:p-14 shadow-2xl animate-fade-in max-h-[90vh] overflow-y-auto">
                                    <div className="flex justify-between items-center mb-12"><div><h2 className="text-4xl font-black uppercase urbanist italic leading-none">Centro de Ajustes Maestro</h2><p className="text-gray-400 font-bold mt-2 uppercase text-xs tracking-[0.3em]">Sincronización de Datos en Ambas Tablas</p></div><button onClick={() => setShowModalPBDesarrollo(false)} className="text-gray-300 hover:text-black transition-all"><Icon name="x-circle" size={48} strokeWidth={1.5} /></button></div>
                                    <form onSubmit={guardarEdicionPB} className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        <div className="col-span-full bg-[#f8f8f8] p-5 rounded-2xl border border-gray-100 flex items-center gap-3"><Icon name="refresh-ccw" size={20} className="text-[#49d5ba]" /><span className="font-black uppercase text-[10px] tracking-widest text-gray-500">Datos Principales (Sincronizados)</span></div>
                                        <div className="md:col-span-1"><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase">ID / Código / Clave</label><input name="editClave" defaultValue={editItem.clave} className="w-full bg-gray-50 rounded-2xl px-6 py-4 text-sm font-black outline-none uppercase shadow-inner" /></div>
                                        <div className="md:col-span-2"><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase">Idea General del Canal</label><input name="editIdea" defaultValue={editItem.idea} className="w-full bg-gray-50 rounded-2xl px-6 py-4 text-lg font-black outline-none uppercase italic shadow-inner" /></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase">Nicho</label><input name="editNicho" defaultValue={editItem.nicho} className="w-full bg-gray-50 rounded-xl px-5 py-4 font-bold uppercase outline-none" /></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase">Subnicho</label><input name="editSubnicho" defaultValue={editItem.subnicho} className="w-full bg-gray-50 rounded-xl px-5 py-4 font-bold uppercase outline-none" /></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase">Micronicho</label><input name="editMicronicho" defaultValue={editItem.micronicho} className="w-full bg-gray-50 rounded-xl px-5 py-4 font-bold uppercase outline-none" /></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase">Nanonicho</label><input name="editNanonicho" defaultValue={editItem.nanonicho} className="w-full bg-gray-50 rounded-xl px-5 py-4 font-bold uppercase outline-none" /></div>
                                        <div className="md:col-span-1"><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase">Red Social</label><select name="editRed" defaultValue={editItem.redSocial} className="w-full bg-gray-50 rounded-xl px-5 py-4 font-black text-xs uppercase outline-none"><option>YouTube</option><option>Instagram</option><option>Facebook</option><option>TikTok</option></select></div>
                                        <div className="md:col-span-1"><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase">Formato</label><select name="editFormato" defaultValue={editItem.formato || 'videos largos'} className="w-full bg-gray-50 rounded-xl px-5 py-4 font-black text-xs uppercase outline-none"><option>videos largos</option><option>shorts</option></select></div>
                                        <div className="col-span-full pt-6"><button type="submit" className="w-full py-8 rounded-[2.5rem] text-2xl font-black shadow-2xl active:scale-[0.98] transition-all uppercase italic tracking-tighter text-black" style={{backgroundColor: colors.primaryPB}}>Guardar Modificaciones Globales</button></div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }
            return null;
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
