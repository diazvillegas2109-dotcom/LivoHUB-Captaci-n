<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livo Hub - Sistema de Captación</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Livo Hub">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Urbanist:wght@600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pb: #49d5ba;
            --secondary-pb: #bbf4ed;
            --bg-body: #f2f0f0;
            --surface: #d9d9d9;
            --text: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f2f0f0;
        }
        .font-black { font-weight: 900; }
        .italic { font-style: italic; }
        
        /* Personalización de scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f2f0f0; }
        ::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #49d5ba; }

        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilo Botones Home */
        .btn-home-pill {
            background-color: #000000;
            color: #ffffff;
            border-radius: 9999px;
            padding: 1.25rem 2rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            font-size: 1.5rem; 
            letter-spacing: -0.025em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 320px;
            text-align: center;
        }
        .btn-home-pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.3);
            filter: brightness(1.2);
        }
        .btn-home-pill:active { transform: scale(0.96); }

        /* Estilos Punto B Integration */
        .urbanist { font-family: 'Urbanist', sans-serif; }
        .main-card-pb {
            background-color: var(--surface);
            border-radius: 1.5rem;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }
        .data-table-container-pb {
            background-color: #ffffff;
            border-radius: 1rem;
            overflow: hidden;
        }
        .niche-tag-pb {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 9999px;
            text-transform: uppercase;
            font-weight: 700;
            background-color: var(--secondary-pb);
            color: #1f5a4e;
            border: 1px solid rgba(73, 213, 186, 0.2);
        }
        .notepad-area-pb {
            background-color: #ffffff;
            background-image: linear-gradient(var(--bg-body) 1px, transparent 1px);
            background-size: 100% 2.5rem;
            line-height: 2.5rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- IMPLEMENTACIÓN: FIREBASE CONFIG (TUS CLAVES) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBgVAAYURCEGdqNya8sizkV7ruL18zu10g",
            authDomain: "livohub-e1cap.firebaseapp.com",
            projectId: "livohub-e1cap",
            storageBucket: "livohub-e1cap.firebasestorage.app",
            messagingSenderId: "66423421771",
            appId: "1:66423421771:web:d69e8178fa2dd0bd6bc6ce"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const Icon = ({ name, size = 24, className = "", strokeWidth = 2, color = "currentColor" }) => {
            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, strokeWidth: strokeWidth, color: color }}></i>;
        };

        const LivoLogo = ({ className = "h-48" }) => (
            <svg viewBox="0 0 300 200" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="20" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>L</text>
                <text x="85" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>ı</text>
                <circle cx="98" cy="45" r="14" fill="#00ead0" />
                <text x="120" y="120" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="110" fill="black" style={{ letterSpacing: '-5px' }}>vo</text>
                <text x="200" y="170" fontFamily="Inter, sans-serif" fontWeight="900" fontSize="55" fill="#00ead0">mx</text>
            </svg>
        );

        const App = () => {
            const colors = {
                neon: '#00ead0',
                primaryPB: '#49d5ba',
                bg: '#f2f0f0',
                card: '#d9d9d9'
            };

            const [currentView, setCurrentView] = useState('home');

            // --- ESTADOS (SINCRONIZADOS CON NUBE) ---
            const [canales, setCanales] = useState([]);
            const [ideasGenerales, setIdeasGenerales] = useState([]);
            const [activeIdeaTab, setActiveIdeaTab] = useState('captacion');
            const [filtroCanalDestino, setFiltroCanalDestino] = useState('Todos');
            const [showModalIdea, setShowModalIdea] = useState(false);
            const [showModalCanal, setShowModalCanal] = useState(false);

            const [registrosPuntoB, setRegistrosPuntoB] = useState([]);
            const [showModalPBRapido, setShowModalPBRapido] = useState(false);
            const [showModalPBDesarrollo, setShowModalPBDesarrollo] = useState(false);
            const [showModalPBNotas, setShowModalPBNotas] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [notaActiva, setNotaActiva] = useState({ id: null, titulo: '', contenido: '' });

            // --- IMPLEMENTACIÓN: ESCUCHA REAL-TIME (FIREBASE) ---
            useEffect(() => {
                const unsubCanales = db.collection("canales").onSnapshot(snap => {
                    setCanales(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                const unsubIdeas = db.collection("ideas").orderBy("fechaCreacion", "desc").onSnapshot(snap => {
                    setIdeasGenerales(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                const unsubRadar = db.collection("radar").onSnapshot(snap => {
                    setRegistrosPuntoB(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => { unsubCanales(); unsubIdeas(); unsubRadar(); };
            }, []);

            // --- FUNCIONES (ACTUALIZADAS PARA FIREBASE) ---
            const agregarCanal = async (e) => {
                e.preventDefault();
                const nombre = e.target.nuevoCanal.value.trim().toUpperCase();
                if (!nombre) return;
                await db.collection("canales").add({ nombre });
                e.target.reset();
                setShowModalCanal(false);
            };

            const eliminarCanal = async (id, nombre) => {
                if (confirm(`¿Eliminar el canal "${nombre}"?`)) {
                    await db.collection("canales").doc(id).delete();
                    if (filtroCanalDestino === nombre) setFiltroCanalDestino('Todos');
                }
            };

            const captarIdea = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                await db.collection("ideas").add({
                    titulo: formData.get('titulo'),
                    urlReferencia: formData.get('urlRef'),
                    urlObjetivo: formData.get('urlObj'),
                    canalDestino: formData.get('canalDestino'),
                    prioridad: 'Media',
                    estatus: 'Pendiente',
                    formato: 'PD',
                    fechaEstimada: '',
                    fechaCreacion: firebase.firestore.FieldValue.serverTimestamp()
                });
                setShowModalIdea(false);
            };

            const updateIdea = async (id, key, value) => {
                await db.collection("ideas").doc(id).update({ [key]: value });
            };

            const eliminarIdea = async (id) => {
                if (confirm('¿Eliminar esta idea definitivamente?')) {
                    await db.collection("ideas").doc(id).delete();
                }
            };

            const registrarPBRapido = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                await db.collection("radar").add({
                    nicho: formData.get('nicho'),
                    subnicho: formData.get('subnicho'),
                    idea: formData.get('ideaCanal'),
                    urlObjetivo: formData.get('urlObjetivo'),
                    redSocial: formData.get('redSocial'),
                    tono: 'Profundo', region: 'España/Latam', 
                    escalabilidad: 3, monetizacion: 'Alta', prioridad: 'Media', estado: 'Idea',
                    observaciones: ''
                });
                setShowModalPBRapido(false);
            };

            const guardarEdicionPB = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                await db.collection("radar").doc(editItem.id).update({
                    idea: formData.get('editIdea'),
                    escalabilidad: parseInt(formData.get('escalabilidad')),
                    estado: formData.get('estado')
                });
                setShowModalPBDesarrollo(false);
            };

            // --- VISTA HOME (IDÉNTICA) ---
            if (currentView === 'home') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 animate-fade-in">
                        <div className="w-full flex flex-col items-center">
                            <LivoLogo className="h-40 md:h-56 w-auto mb-4" />
                            <h2 className="text-lg md:text-xl font-black uppercase italic tracking-[0.3em] text-gray-800 mb-10 text-center">
                                ETAPA 1: CAPTACIÓN
                            </h2>
                            <div className="flex flex-col items-center gap-6 w-full">
                                <button onClick={() => setCurrentView('idea-hub')} className="btn-home-pill">Idea</button>
                                <button onClick={() => setCurrentView('canal-radar')} className="btn-home-pill">Canal</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- VISTA IDEA HUB (IDÉNTICA) ---
            if (currentView === 'idea-hub') {
                return (
                    <div className="min-h-screen pb-20 animate-fade-in">
                        <nav className="bg-white border-b border-gray-200 px-4 md:px-8 py-3 sticky top-0 z-40">
                            <div className="max-w-[1600px] mx-auto flex justify-between items-center">
                                <div className="flex items-center gap-4 md:gap-12">
                                    <button onClick={() => setCurrentView('home')} className="p-2 hover:bg-gray-100 rounded-full transition-all text-black">
                                        <Icon name="chevron-left" strokeWidth={3} />
                                    </button>
                                    <h1 className="text-2xl md:text-3xl font-black tracking-tighter italic leading-none hidden sm:block">
                                        LIVO<span className="text-[#49d5ba] not-italic">HUB</span>
                                    </h1>
                                    <div className="flex bg-gray-100 p-1 rounded-xl shadow-inner border border-gray-200 overflow-x-auto">
                                        <button onClick={() => setActiveIdeaTab('captacion')} className={`px-3 md:px-6 py-2 rounded-lg text-[10px] md:text-xs font-black uppercase transition-all ${activeIdeaTab === 'captacion' ? 'bg-white shadow-md text-black' : 'text-gray-400'}`}>1. Registro Maestro</button>
                                        <button onClick={() => setActiveIdeaTab('gestion')} className={`px-3 md:px-6 py-2 rounded-lg text-[10px] md:text-xs font-black uppercase transition-all ${activeIdeaTab === 'gestion' ? 'bg-white shadow-md text-black' : 'text-gray-400'}`}>2. Planificación</button>
                                        <button onClick={() => setActiveIdeaTab('config')} className={`px-3 py-2 rounded-lg transition-all ${activeIdeaTab === 'config' ? 'bg-white shadow-md text-black' : 'text-gray-400'}`}><Icon name="settings" size={16} /></button>
                                    </div>
                                </div>
                                <button onClick={() => setShowModalIdea(true)} className="bg-[#49d5ba] text-black font-black px-4 md:px-8 py-3 rounded-2xl flex items-center gap-2 transition-all shadow-lg active:scale-95">
                                    <Icon name="plus" size={18} strokeWidth={3} /> <span className="hidden md:inline uppercase text-xs">Captar Idea</span>
                                </button>
                            </div>
                        </nav>

                        <main className="max-w-[1600px] mx-auto p-4 md:p-8">
                            {activeIdeaTab === 'captacion' && (
                                <section className="space-y-6 animate-fade-in">
                                    <div className="bg-[#d9d9d9] rounded-[2rem] md:rounded-[2.5rem] p-4 md:p-8 shadow-sm border border-black/5">
                                        <div className="flex flex-col gap-6 mb-8">
                                            <div className="flex items-center gap-4">
                                                <div className="w-2 h-8 bg-black rounded-full"></div>
                                                <h2 className="text-xl font-black uppercase tracking-tight italic">Ecosistema Livo</h2>
                                            </div>
                                            <div className="bg-white/40 p-2 rounded-[1.5rem] flex flex-wrap gap-2 items-center border border-white/60 shadow-inner overflow-x-auto">
                                                <div className="px-4 py-2 flex items-center gap-2 text-black/40"><Icon name="filter" size={14} /><span className="text-[9px] font-black uppercase tracking-widest">Canal:</span></div>
                                                <button onClick={() => setFiltroCanalDestino('Todos')} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all border ${filtroCanalDestino === 'Todos' ? 'bg-black text-[#49d5ba]' : 'bg-white text-gray-400 border-gray-100'}`}>Todo el Contenido</button>
                                                {canales.map(c => (
                                                    <button key={c.id} onClick={() => setFiltroCanalDestino(c.nombre)} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all border ${filtroCanalDestino === c.nombre ? 'bg-black text-[#49d5ba]' : 'bg-white text-gray-400 border-gray-100'}`}>{c.nombre}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-3xl overflow-hidden shadow-inner border border-gray-200 overflow-x-auto">
                                            <table className="w-full text-left text-sm min-w-[800px]">
                                                <thead>
                                                    <tr className="bg-gray-50 border-b border-gray-100 text-[10px] font-black uppercase text-gray-400 tracking-wider">
                                                        <th className="px-8 py-5 text-black">Concepto / Idea</th>
                                                        <th className="px-6 py-5 text-center">Referencia</th>
                                                        <th className="px-6 py-5 text-center">Meta Visual</th>
                                                        <th className="px-6 py-5 text-center">Canal</th>
                                                        <th className="px-8 py-5 text-right">Acción</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-50">
                                                    {(filtroCanalDestino === 'Todos' ? ideasGenerales : ideasGenerales.filter(i => i.canalDestino === filtroCanalDestino)).map(idea => (
                                                        <tr key={idea.id} className="hover:bg-gray-50/80 transition-colors group">
                                                            <td className="px-8 py-5 font-bold text-gray-900 uppercase italic">{idea.titulo}</td>
                                                            <td className="px-6 py-5 text-center">
                                                                {idea.urlReferencia && <a href={idea.urlReferencia} target="_blank" className="text-gray-300 hover:text-black inline-block"><Icon name="external-link" size={16} /></a>}
                                                            </td>
                                                            <td className="px-6 py-5 text-center">
                                                                {idea.urlObjetivo && <a href={idea.urlObjetivo} target="_blank" className="text-gray-300 hover:text-[#49d5ba] inline-block"><Icon name="layout" size={16} /></a>}
                                                            </td>
                                                            <td className="px-6 py-5 text-center">
                                                                <span className="bg-black text-[#49d5ba] px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-tighter">{idea.canalDestino}</span>
                                                            </td>
                                                            <td className="px-8 py-5 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <button onClick={() => eliminarIdea(idea.id)} className="text-gray-200 hover:text-red-500 transition-colors"><Icon name="trash-2" size={16} /></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {ideasGenerales.length === 0 && <tr><td colSpan="5" className="py-20 text-center opacity-10 font-black uppercase text-xs">Sin ideas registradas</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </section>
                            )}

                            {activeIdeaTab === 'gestion' && (
                                <section className="space-y-10 animate-fade-in">
                                    {canales.length === 0 ? (
                                        <div className="text-center py-20 opacity-20 font-black uppercase italic">Crea canales en configuración primero</div>
                                    ) : canales.map(canal => {
                                        const ideasCanal = ideasGenerales.filter(i => i.canalDestino === canal.nombre);
                                        return (
                                            <div key={canal.id} className="bg-[#d9d9d9] rounded-[2rem] md:rounded-[2.5rem] p-4 md:p-8 shadow-sm">
                                                <div className="flex items-center gap-4 mb-6">
                                                    <div className="w-12 h-12 bg-black text-[#49d5ba] rounded-2xl flex items-center justify-center font-black text-xl italic">{canal.nombre.charAt(0)}</div>
                                                    <h2 className="text-2xl font-black uppercase tracking-tight italic">{canal.nombre}</h2>
                                                </div>
                                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-inner overflow-x-auto">
                                                    <table className="w-full text-left min-w-[900px]">
                                                        <thead>
                                                            <tr className="bg-gray-50 text-[9px] font-black uppercase text-gray-400 tracking-widest border-b border-gray-100">
                                                                <th className="px-8 py-5 text-black">Contenido</th>
                                                                <th className="px-4 py-5 text-center">Prioridad</th>
                                                                <th className="px-4 py-5 text-center">Estatus</th>
                                                                <th className="px-4 py-5 text-center">Formato</th>
                                                                <th className="px-6 py-5 text-center">Fecha Estimada</th>
                                                                <th className="px-8 py-5 text-right"></th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-gray-50">
                                                            {ideasCanal.map(idea => (
                                                                <tr key={idea.id} className="hover:bg-gray-50/50 transition-colors">
                                                                    <td className="px-8 py-5 font-bold text-gray-900 text-sm uppercase italic">{idea.titulo}</td>
                                                                    <td className="px-4 py-5 text-center">
                                                                        <select 
                                                                            value={idea.prioridad} 
                                                                            onChange={(e) => updateIdea(idea.id, 'prioridad', e.target.value)}
                                                                            className="bg-gray-100 text-black font-black text-[10px] px-4 py-2 rounded-full uppercase outline-none cursor-pointer"
                                                                        >
                                                                            <option>Alta</option><option>Media</option><option>Baja</option>
                                                                        </select>
                                                                    </td>
                                                                    <td className="px-4 py-5 text-center">
                                                                        <select 
                                                                            value={idea.estatus}
                                                                            onChange={(e) => updateIdea(idea.id, 'estatus', e.target.value)}
                                                                            style={{ backgroundColor: idea.estatus === 'Completado' ? '#49d5ba' : idea.estatus === 'En progreso' ? '#facc15' : '#ff9500' }}
                                                                            className="font-black text-[10px] px-5 py-2 rounded-full uppercase outline-none cursor-pointer text-black"
                                                                        >
                                                                            <option>Pendiente</option><option>En progreso</option><option>Completado</option>
                                                                        </select>
                                                                    </td>
                                                                    <td className="px-4 py-5 text-center">
                                                                        <div className="flex justify-center gap-1">
                                                                            {['VL', 'S', 'PD'].map(f => (
                                                                                <button key={f} onClick={() => updateIdea(idea.id, 'formato', f)} className={`w-8 h-8 rounded-lg font-black text-[10px] ${idea.formato === f ? 'bg-black text-[#49d5ba]' : 'bg-gray-100 text-gray-400'}`}>{f}</button>
                                                                            ))}
                                                                        </div>
                                                                    </td>
                                                                    <td className="px-6 py-5">
                                                                        <input 
                                                                            type="text" value={idea.fechaEstimada} 
                                                                            onChange={(e) => updateIdea(idea.id, 'fechaEstimada', e.target.value)}
                                                                            placeholder="Día/Mes" 
                                                                            className="w-full bg-[#f8f8f8] border-none rounded-xl px-4 py-2 text-[11px] font-bold outline-none text-center" />
                                                                    </td>
                                                                    <td className="px-8 py-5 text-right"><button onClick={() => eliminarIdea(idea.id)} className="text-gray-200 hover:text-red-500"><Icon name="trash-2" size={14}/></button></td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </section>
                            )}

                            {activeIdeaTab === 'config' && (
                                <section className="max-w-2xl mx-auto animate-fade-in">
                                    <div className="bg-[#d9d9d9] rounded-[3rem] p-6 md:p-10 border border-black/5 shadow-lg">
                                        <div className="flex items-center gap-4 mb-8">
                                            <div className="w-2 h-10 bg-black rounded-full"></div>
                                            <h2 className="text-2xl md:text-3xl font-black uppercase tracking-tighter italic">Canales Activos</h2>
                                        </div>
                                        <div className="space-y-4 mb-10">
                                            {canales.map(c => (
                                                <div key={c.id} className="bg-white p-6 rounded-[2rem] flex justify-between items-center group transition-all shadow-sm">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-12 h-12 bg-black text-[#49d5ba] rounded-2xl flex items-center justify-center font-black text-xl italic">{c.nombre.charAt(0)}</div>
                                                        <span className="font-black text-lg tracking-tight uppercase italic">{c.nombre}</span>
                                                    </div>
                                                    <button onClick={() => eliminarCanal(c.id, c.nombre)} className="text-gray-200 hover:text-red-500 transition-colors"><Icon name="trash-2" size={20}/></button>
                                                </div>
                                            ))}
                                            {canales.length === 0 && <p className="text-center py-10 opacity-30 font-black uppercase text-xs italic">No hay canales configurados</p>}
                                        </div>
                                        <button onClick={() => setShowModalCanal(true)} className="w-full bg-black text-[#49d5ba] font-black py-6 rounded-[2rem] text-lg shadow-xl flex items-center justify-center gap-3 italic uppercase active:scale-95 transition-all">
                                            <Icon name="plus" size={24} strokeWidth={3} /> Añadir Canal
                                        </button>
                                    </div>
                                </section>
                            )}
                        </main>

                        {/* Modales Idea Hub */}
                        {showModalIdea && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                                <div className="bg-white w-full max-w-2xl rounded-[3rem] p-8 md:p-12 shadow-2xl relative animate-fade-in">
                                    <button onClick={() => setShowModalIdea(false)} className="absolute top-8 right-8 text-gray-400 hover:text-black transition-all"><Icon name="x" size={32}/></button>
                                    {canales.length === 0 ? (
                                        <div className="text-center py-10">
                                            <Icon name="radio" size={60} className="mx-auto text-gray-200 mb-6" />
                                            <h3 className="text-2xl font-black uppercase mb-2 italic">Sin destinos</h3>
                                            <p className="text-gray-400 text-xs font-bold mb-8 italic">Primero crea un canal en configuración.</p>
                                            <button onClick={() => {setShowModalIdea(false); setActiveIdeaTab('config');}} className="bg-black text-[#49d5ba] px-8 py-4 rounded-2xl font-black uppercase text-xs italic active:scale-95 transition-all">Ir a Configuración</button>
                                        </div>
                                    ) : (
                                        <>
                                            <h2 className="text-4xl font-black italic uppercase leading-none mb-10">Nueva Idea</h2>
                                            <form onSubmit={captarIdea} className="space-y-6">
                                                <input name="titulo" required className="w-full bg-[#f8f8f8] border-2 border-transparent focus:border-[#49d5ba] rounded-2xl px-6 py-5 font-bold text-xl outline-none uppercase italic" placeholder="Concepto de Contenido" />
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <input name="urlRef" className="bg-[#f8f8f8] rounded-2xl px-6 py-4 outline-none text-sm font-medium" placeholder="URL Referencia" />
                                                    <input name="urlObj" className="bg-[#f8f8f8] rounded-2xl px-6 py-4 outline-none text-sm font-medium" placeholder="Muestra Visual" />
                                                </div>
                                                <select name="canalDestino" required className="w-full bg-black text-[#49d5ba] rounded-2xl px-6 py-5 font-black uppercase text-sm cursor-pointer outline-none">
                                                    {canales.map(c => <option key={c.id} value={c.nombre}>{c.nombre}</option>)}
                                                </select>
                                                <button type="submit" className="w-full bg-[#49d5ba] text-black font-black py-7 rounded-[2.5rem] text-2xl shadow-xl italic uppercase active:scale-[0.98] transition-all">Captar Idea</button>
                                            </form>
                                        </>
                                    )}
                                </div>
                            </div>
                        )}

                        {showModalCanal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                                <div className="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl text-center animate-fade-in">
                                    <h2 className="text-3xl font-black uppercase mb-8 italic">Nuevo Canal</h2>
                                    <form onSubmit={agregarCanal}>
                                        <input name="nuevoCanal" required className="w-full bg-[#f8f8f8] border-2 border-transparent focus:border-black rounded-2xl px-6 py-6 font-black uppercase text-center mb-8 outline-none text-xl transition-all" placeholder="EJ: TIKTOK" />
                                        <div className="flex gap-4">
                                            <button type="button" onClick={() => setShowModalCanal(false)} className="flex-1 font-black text-gray-400 py-4 uppercase text-[10px] tracking-widest">Cerrar</button>
                                            <button type="submit" className="flex-[2] bg-black text-[#49d5ba] font-black py-4 rounded-2xl shadow-lg uppercase text-[10px] italic tracking-widest active:scale-95 transition-transform">Registrar</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // --- VISTA CANAL RADAR (PUNTO B) (IDÉNTICA) ---
            if (currentView === 'canal-radar') {
                return (
                    <div className="min-h-screen pb-20 animate-fade-in">
                        <header className="px-8 py-10 flex flex-col md:flex-row justify-between items-end md:items-center gap-4 max-w-[1600px] mx-auto">
                            <div className="flex items-center gap-6">
                                <button onClick={() => setCurrentView('home')} className="p-4 bg-white hover:bg-gray-100 rounded-2xl shadow-sm transition-all text-black"><Icon name="chevron-left" strokeWidth={3} /></button>
                                <div>
                                    <h1 className="text-5xl font-black tracking-tighter urbanist">PUNTO <span style={{color: colors.primaryPB}}>B</span></h1>
                                    <p className="text-gray-500 font-semibold text-lg">Sistema Central de Captación & Análisis</p>
                                </div>
                            </div>
                            <button onClick={() => setShowModalPBRapido(true)} className="px-10 py-5 rounded-2xl flex items-center gap-3 text-lg font-bold shadow-sm hover:translate-y-[-2px] transition-all" style={{backgroundColor: colors.primaryPB}}><i className="fa-solid fa-plus-circle"></i> NUEVA CAPTURA</button>
                        </header>

                        <main className="max-w-[1600px] mx-auto p-4 md:p-8">
                            <section className="mb-10">
                                <div className="main-card-pb p-6 shadow-sm">
                                    <div className="flex items-center gap-3 mb-6 px-2"><div className="w-1.5 h-6 rounded-full" style={{backgroundColor: colors.primaryPB}}></div><h2 className="text-lg font-bold uppercase tracking-widest text-gray-700">1. Radar de Ideas Rápido</h2></div>
                                    <div className="data-table-container-pb shadow-sm border border-black/5">
                                        <table className="w-full text-sm text-left">
                                            <thead>
                                                <tr className="text-gray-400 uppercase text-[9px] font-black tracking-widest bg-[#f8f8f8]"><th className="px-8 py-5">Jerarquía</th><th className="px-8 py-5">Concepto</th><th className="px-8 py-5 text-center">Benchmark</th><th className="px-8 py-5">Red / Formato</th><th className="px-8 py-5 text-right">Borrar</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-50">
                                                {registrosPuntoB.map(r => (
                                                    <tr key={r.id} className="hover:bg-teal-50/30 transition-colors">
                                                        <td className="px-8 py-5"><div className="font-black text-[10px] uppercase">{r.nicho}</div><div className="text-[9px] text-gray-400 font-bold">{r.subnicho}</div></td>
                                                        <td className="px-8 py-5 font-black text-gray-900 text-sm italic uppercase">{r.idea}</td>
                                                        <td className="px-8 py-5 text-center"><a href={r.urlObjetivo} target="_blank" className="text-gray-200 hover:text-black transition-all"><i className="fa-solid fa-link text-lg"></i></a></td>
                                                        <td className="px-8 py-5"><span className="px-3 py-1 rounded-lg bg-gray-50 border border-gray-100 text-[10px] font-black text-gray-600 uppercase">{r.redSocial}</span></td>
                                                        <td className="px-8 py-5 text-right"><button onClick={async () => await db.collection("radar").doc(r.id).delete()} className="text-gray-200 hover:text-red-500 transition-colors"><i className="fa-solid fa-trash-can"></i></button></td>
                                                    </tr>
                                                ))}
                                                {registrosPuntoB.length === 0 && <tr><td colSpan="5" className="py-24 text-center opacity-10 font-black uppercase text-xs">Sin Registros</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </section>

                            <section>
                                <div className="main-card-pb p-6 shadow-sm">
                                    <div className="flex items-center gap-3 mb-6 px-2"><div className="w-1.5 h-6 rounded-full bg-black"></div><h2 className="text-lg font-bold uppercase tracking-widest text-gray-700">2. Análisis & Profundización</h2></div>
                                    <div className="data-table-container-pb shadow-sm border border-black/5 overflow-x-auto">
                                        <table className="w-full text-[11px] text-left">
                                            <thead>
                                                <tr className="text-gray-400 uppercase font-black tracking-widest text-[9px] bg-[#f8f8f8]"><th className="px-8 py-5">Identificación</th><th className="px-6 py-5">Atributos</th><th className="px-6 py-5 text-center">Escalabilidad</th><th className="px-6 py-5">Rentabilidad</th><th className="px-6 py-5">Prioridad</th><th className="px-6 py-5">Estado</th><th className="px-6 py-5 text-center">Notas</th><th className="px-8 py-5 text-right">Acción</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-50">
                                                {registrosPuntoB.map(r => (
                                                    <tr key={r.id} className="hover:bg-teal-50/30">
                                                        <td className="px-8 py-5"><div className="font-black text-gray-900 uppercase">{r.idea}</div><div className="flex gap-1 mt-1"><span className="niche-tag-pb">{r.nicho}</span></div></td>
                                                        <td className="px-6 py-5 font-bold text-gray-400 text-[9px] uppercase tracking-tighter">{r.tono} / {r.region}</td>
                                                        <td className="px-6 py-5 text-center text-yellow-500 text-sm">{'★'.repeat(r.escalabilidad)}</td>
                                                        <td className="px-6 py-5 font-black" style={{color: colors.primaryPB}}>$$ {r.monetizacion}</td>
                                                        <td className="px-6 py-5"><span className="px-2 py-0.5 rounded-md bg-gray-50 border border-gray-100 font-black text-gray-500 text-[9px] uppercase">{r.prioridad}</span></td>
                                                        <td className="px-6 py-5"><span className="flex items-center gap-1 font-black text-[9px] uppercase"><i className="fa-solid fa-circle text-[5px]" style={{color: colors.primaryPB}}></i> {r.estado}</span></td>
                                                        <td className="px-6 py-5 text-center"><button onClick={() => { setNotaActiva({id: r.id, titulo: r.idea, contenido: r.observaciones}); setShowModalPBNotas(true); }} className={`w-10 h-10 rounded-2xl flex items-center justify-center transition-all ${r.observaciones ? 'bg-black text-white' : 'bg-gray-50 text-gray-200 border border-gray-100'}`}><i className="fa-solid fa-pen-nib"></i></button></td>
                                                        <td className="px-8 py-5 text-right"><button onClick={() => { setEditItem(r); setShowModalPBDesarrollo(true); }} className="text-[9px] font-black px-5 py-2 rounded-xl border-2 border-black hover:bg-black hover:text-white transition-all uppercase tracking-widest">Ajustes</button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </section>
                        </main>

                        {/* Modales Punto B */}
                        {showModalPBRapido && (
                            <div className="fixed inset-0 bg-black/50 backdrop-blur-md z-50 flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-2xl rounded-[2.5rem] p-10 shadow-2xl animate-fade-in">
                                    <div className="flex justify-between items-center mb-8"><h2 className="text-3xl font-black italic uppercase urbanist">Nueva Idea Radar</h2><button onClick={() => setShowModalPBRapido(false)} className="text-gray-300 hover:text-black transition-all"><i className="fa-solid fa-circle-xmark text-3xl"></i></button></div>
                                    <form onSubmit={registrarPBRapido} className="grid grid-cols-2 gap-5">
                                        <input name="nicho" required className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none uppercase font-bold text-sm" placeholder="Nicho General" />
                                        <input name="subnicho" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none uppercase font-bold text-sm" placeholder="Subnicho" />
                                        <input name="ideaCanal" required className="col-span-2 w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 font-bold text-lg outline-none uppercase italic" placeholder="Idea del Canal" />
                                        <input name="urlObjetivo" type="url" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none text-xs" placeholder="URL Referencia" />
                                        <select name="redSocial" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none"><option>YouTube</option><option>TikTok</option><option>Instagram</option></select>
                                        <button type="submit" className="col-span-2 py-5 rounded-2xl text-lg font-black mt-4 shadow-xl active:scale-95 transition-all" style={{backgroundColor: colors.primaryPB}}>REGISTRAR EN RADAR</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {showModalPBDesarrollo && editItem && (
                            <div className="fixed inset-0 bg-black/50 backdrop-blur-md z-50 flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-3xl rounded-[2.5rem] p-10 shadow-2xl animate-fade-in max-h-[90vh] overflow-y-auto">
                                    <div className="flex justify-between items-center mb-8"><h2 className="text-3xl font-black uppercase urbanist">Ficha Técnica</h2><button onClick={() => setShowModalPBDesarrollo(false)} className="text-gray-300 hover:text-black"><i className="fa-solid fa-circle-xmark text-3xl"></i></button></div>
                                    <form onSubmit={guardarEdicionPB} className="grid grid-cols-2 gap-6">
                                        <input name="editIdea" defaultValue={editItem.idea} className="col-span-2 w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-2xl font-black outline-none uppercase italic" />
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-1 uppercase">Escalabilidad (1-5)</label><input name="escalabilidad" type="number" min="1" max="5" defaultValue={editItem.escalabilidad} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none font-bold" /></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-1 uppercase">Estado</label><select name="estado" defaultValue={editItem.estado} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none uppercase font-bold text-xs"><option>Idea</option><option>Validando</option><option>Aperturado</option></select></div>
                                        <button type="submit" className="col-span-2 w-full py-5 rounded-2xl text-xl font-black shadow-lg mt-4 active:scale-95 transition-all uppercase italic" style={{backgroundColor: colors.primaryPB}}>Guardar Análisis</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {showModalPBNotas && (
                            <div className="fixed inset-0 bg-black/70 backdrop-blur-md z-[60] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-4xl rounded-[3rem] shadow-2xl animate-fade-in overflow-hidden">
                                    <div className="p-10 border-b border-gray-100 flex justify-between items-center bg-[#fafafa]">
                                        <div><h2 className="text-4xl font-black italic uppercase urbanist" style={{color: colors.primaryPB}}>Bloc de Notas</h2><p className="text-gray-400 font-bold mt-1 uppercase text-xs tracking-[0.2em]">ID: {notaActiva.titulo}</p></div>
                                        <button onClick={() => setShowModalPBNotas(false)} className="text-gray-200 hover:text-red-500 transition-all"><i className="fa-solid fa-circle-xmark text-5xl"></i></button>
                                    </div>
                                    <div className="p-10 bg-white">
                                        <textarea className="w-full h-96 notepad-area-pb text-xl text-gray-800 border-none focus:ring-0 resize-none font-medium outline-none" placeholder="Describe aquí la estrategia de contenido..." value={notaActiva.contenido} onChange={(e) => setNotaActiva({...notaActiva, contenido: e.target.value})}></textarea>
                                    </div>
                                    <div className="p-10 bg-[#f8f8f8] flex justify-end">
                                        <button onClick={async () => { await db.collection("radar").doc(notaActiva.id).update({observaciones: notaActiva.contenido}); setShowModalPBNotas(false); }} className="px-16 py-5 rounded-3xl text-xl font-black shadow-xl active:scale-95 transition-all uppercase italic" style={{backgroundColor: colors.primaryPB}}>Guardar Bloc</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
